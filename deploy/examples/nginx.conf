# nginx — TLS termination + reverse proxy to local-messenger on 127.0.0.1:3000.
#
# Prerequisites:
#   - Hostname pointing at this host
#   - TLS cert (e.g. `sudo certbot --nginx -d chat.example.com`)
#
# Save as /etc/nginx/sites-available/local-messenger, symlink into sites-enabled,
# then `sudo nginx -t && sudo systemctl reload nginx`.
#
# In .env (or /etc/local-messenger/env), leave these empty for root-mount:
#   BASE_PATH=
#   PUBLIC_BASE_PATH=
#   VITE_BASE_PATH=/

# Required once per nginx instance (top-level http {} block, e.g. in nginx.conf).
# Maps the incoming Upgrade header so Connection can flip between "upgrade"
# (for WebSocket) and "close" (for plain HTTP) per-request.
map $http_upgrade $connection_upgrade {
	default upgrade;
	''      close;
}

server {
	listen 443 ssl http2;
	listen [::]:443 ssl http2;
	server_name chat.example.com;

	ssl_certificate     /etc/letsencrypt/live/chat.example.com/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/chat.example.com/privkey.pem;

	# Image uploads (HEIC etc.) can be large.
	client_max_body_size 25m;

	location / {
		proxy_pass http://127.0.0.1:3000;
		proxy_http_version 1.1;

		# Forwarded headers — useful if you later enable Fastify trustProxy
		# so rate-limit etc. see the real client IP.
		proxy_set_header Host              $host;
		proxy_set_header X-Real-IP         $remote_addr;
		proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;

		# Socket.io WebSocket upgrade.
		proxy_set_header Upgrade    $http_upgrade;
		proxy_set_header Connection $connection_upgrade;

		# Long-lived WS — generous read timeout.
		proxy_read_timeout 3600s;
		proxy_send_timeout 3600s;
	}
}

# HTTP → HTTPS redirect.
server {
	listen 80;
	listen [::]:80;
	server_name chat.example.com;
	return 301 https://$host$request_uri;
}
